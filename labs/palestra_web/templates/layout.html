<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Palestra Web" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">Palestra Web</a>
      <nav>
        <a href="{{ url_for('admin_home') }}">Amministratore</a>
        <a href="{{ url_for('trainer_home') }}">Istruttore</a>
        <a href="{{ url_for('member_home') }}">Iscritto</a>
      </nav>
    </header>

    <main class="page">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="messages">
            {% for category, message in messages %}
              <p class="message {{ category }}">{{ message }}</p>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
